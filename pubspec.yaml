name: qr_scanner_pro
description: A professional QR Scanner app with local history storage.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '^3.10.0'

dependencies:
  flutter:
    sdk: flutter

  # QR Scanning
  mobile_scanner: ^5.1.1

  # Local Database
  sqflite: ^2.3.3+1
  path: ^1.9.0

  # State Management
  provider: ^6.1.2

  # Preferences
  shared_preferences: ^2.2.3

  # URL Handling
  url_launcher: ^6.3.0

  # Utilities
  intl: ^0.19.0
  vibration: ^2.0.0
  share_plus: ^10.0.2
  flutter_animate: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1
  
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_logo.png"

flutter:
  uses-material-design: true
